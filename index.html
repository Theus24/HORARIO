<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salas do 2º Ano de Informática</title>
    <link rel="icon" type="image/webp" href="imgicon/download%20(4).webp">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main>
        <section class="app" aria-labelledby="titulo">
            <h1 id="titulo">Horário 2º Info</h1>
            <p class="subtitle">escolher o dia e aula para onde a turma ta atualmente e qual a próx sala.</p>

            <div class="controls">
                <label for="dia">
                    Dia da semana
                    <select id="dia">
                        <option value="segunda">Segunda-feira</option>
                        <option value="terca">Terça-feira</option>
                        <option value="quarta">Quarta-feira</option>
                        <option value="quinta">Quinta-feira</option>
                        <option value="sexta">Sexta-feira</option>
                    </select>
                </label>

                <label for="aula">
                    Aula atual
                    <select id="aula">
                        <option value="1">1ª aula</option>
                        <option value="2">2ª aula</option>
                        <option value="3">3ª aula</option>
                        <option value="4">4ª aula</option>
                        <option value="5">5ª aula</option>
                        <option value="6">6ª aula</option>
                        <option value="7">7ª aula</option>
                        <option value="8">8ª aula</option>
                        <option value="9">9ª aula</option>
                        <option value="10">10ª aula</option>
                    </select>
                </label>
            </div>

            <div id="aviso" class="warning" hidden></div>

            <div class="result" aria-live="polite">
                <div class="box">
                    <strong>Sala atual</strong>
                    <div id="salaAtual" class="room">A106</div>
                    <div id="textoAtual" class="note"></div>
                </div>

                <div class="box">
                    <strong>Próxima aula</strong>
                    <div id="proximaSala" class="room">B110</div>
                    <div id="textoProxima" class="note"></div>
                </div>
            </div>

            <div class="timeline">
                <h2>Aulas do dia</h2>
                <div id="linhaAulas" class="classes"></div>
            </div>
        </section>
    </main>

    <script>
        const horarios = {
            segunda: ["A106", "A106", "B110", "B110", "B110", "B109"],
            terca: ["A106", "A106", "B110", "B110", "A106", "A106", "A106", "A106", "A106", "A106"],
            quarta: ["B110", "B110", "B110", "B110", "B110", "B110"],
            quinta: ["B110", "B110", "B110", "B110", "B110", "B110", "A106", "A106", "B110", "B110"],
            sexta: ["B110", "B110", "A106", "A106"]
        };

        const tiposSalas = {
            B110: "sala de aula",
            A106: "informática",
            B109: "sala de artes"
        };

        const nomesDias = {
            segunda: "segunda-feira",
            terca: "terça-feira",
            quarta: "quarta-feira",
            quinta: "quinta-feira",
            sexta: "sexta-feira"
        };

        const diaSelect = document.querySelector("#dia");
        const aulaSelect = document.querySelector("#aula");
        const aviso = document.querySelector("#aviso");
        const salaAtual = document.querySelector("#salaAtual");
        const proximaSala = document.querySelector("#proximaSala");
        const textoAtual = document.querySelector("#textoAtual");
        const textoProxima = document.querySelector("#textoProxima");
        const linhaAulas = document.querySelector("#linhaAulas");

        function atualizarTela() {
            const dia = diaSelect.value;
            const aula = Number(aulaSelect.value);
            const aulasDoDia = horarios[dia];
            const sala = aulasDoDia[aula - 1];
            const proxima = aulasDoDia[aula];

            aviso.hidden = true;

            if (!sala) {
                salaAtual.textContent = "-";
                proximaSala.textContent = "-";
                textoAtual.textContent = `Na ${aula}ª aula de ${nomesDias[dia]} não há sala cadastrada.`;
                textoProxima.textContent = "Escolha uma aula que exista nesse dia.";
                aviso.hidden = false;
                aviso.textContent = `${capitalizar(nomesDias[dia])} tem apenas ${aulasDoDia.length} aulas cadastradas.`;
                montarLinhaDoDia(aulasDoDia, aula);
                return;
            }

            salaAtual.textContent = sala;
            textoAtual.textContent = `${aula}ª aula de ${nomesDias[dia]}: ${descricaoSala(sala)}.`;

            if (proxima) {
                proximaSala.textContent = proxima;
                textoProxima.textContent = `${aula + 1}ª aula: ${descricaoSala(proxima)}.`;
            } else {
                proximaSala.textContent = "-";
                textoProxima.textContent = "Depois dessa aula, não há próxima sala cadastrada para esse dia.";
            }

            montarLinhaDoDia(aulasDoDia, aula);
        }

        function montarLinhaDoDia(aulasDoDia, aulaAtual) {
            linhaAulas.innerHTML = "";

            for (let i = 1; i <= aulasDoDia.length; i++) {
                const sala = aulasDoDia[i - 1];
                const item = document.createElement("div");
                item.className = "class-item";

                if (i === aulaAtual) {
                    item.classList.add("active");
                }

                item.innerHTML = `
                    <span class="class-number">${i}ª aula</span>
                    <span class="class-room">${sala}</span>
                    <span class="class-kind">${tiposSalas[sala]}</span>
                `;

                linhaAulas.appendChild(item);
            }
        }

        function descricaoSala(sala) {
            return `${sala}, ${tiposSalas[sala]}`;
        }

        function capitalizar(texto) {
            return texto[0].toUpperCase() + texto.slice(1);
        }

        diaSelect.addEventListener("change", atualizarTela);
        aulaSelect.addEventListener("change", atualizarTela);

        atualizarTela();
    </script>
</body>
</html>
